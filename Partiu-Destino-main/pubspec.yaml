name: partiu_destino
description: TripApp - Viagens e Hospedagens
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  cupertino_icons: ^1.0.6
  image_picker: ^1.0.7
  url_launcher: ^6.2.5
  pdf: ^3.10.7
  printing: ^5.11.1
  path_provider: ^2.1.2
  fl_chart: ^0.66.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo_partiu_destino.jpg
    - assets/images/logo_partiu_destino.png
    - assets/images/logo_partiu_destino_original.png
